document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?
          'window.__bundler_pages = ' + JSON.stringify(pageIds) + ';' +
          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +
              'var n = p[j], tn = n && n.tagName;' +
              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

dding: 16px 30px; border-radius: 2px;\">Start a print job →<\u002Fa>\n      <a href=\"tel:5123891747\" style=\"text-decoration: none; background: transparent; color: #0e0e10; font-weight: 800; font-size: 16px; padding: 16px 30px; border-radius: 2px; border: 2px solid #0e0e10;\">Call 512-389-1747<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"margin-top: 64px; height: 18px; display: flex; border-radius: 2px; overflow: hidden;\">\n      <span style=\"flex:1; background:#00aeef;\"><\u002Fspan>\n      <span style=\"flex:1; background:#ec008c;\"><\u002Fspan>\n      <span style=\"flex:1; background:#ffd400;\"><\u002Fspan>\n      <span style=\"flex:1; background:#0e0e10;\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ MARQUEE ============ -->\n  <div style=\"background: #0e0e10; color: #f6f4ee; padding: 16px 0; overflow: hidden; white-space: nowrap; border-top: 2px solid #0e0e10; border-bottom: 2px solid #0e0e10;\">\n    <div style=\"display: inline-flex; gap: 0; animation: marquee 26s linear infinite; font-family: 'Space Mono', monospace; font-size: 15px; letter-spacing: 0.06em; text-transform: uppercase;\">\n      <span style=\"display:inline-flex; gap:0;\">{{ marqueeRun }}<\u002Fspan>\n      <span style=\"display:inline-flex; gap:0;\" aria-hidden=\"true\">{{ marqueeRun }}<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ STATS ============ -->\n  <section style=\"max-width: 1240px; margin: 0 auto; padding: 72px 28px;\">\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 2px; background: #0e0e10; border: 2px solid #0e0e10; border-radius: 2px; overflow: hidden;\">\n      <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"4\">\n        <div style=\"background: #f6f4ee; padding: 36px 28px;\">\n          <div style=\"font-weight: 900; font-size: 52px; line-height: 1; letter-spacing: -0.04em; color: {{ s.color }};\">{{ s.num }}<\u002Fdiv>\n          <div style=\"margin-top: 12p r email your file, and we'll process your job on time, every time.<\u002Fdiv>\n      <a href=\"#quote\" style=\"text-decoration: none; background: #0e0e10; color: #fff; font-weight: 700; padding: 14px 24px; border-radius: 2px; white-space: nowrap;\">Send a file →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ WHAT WE PRINT ============ -->\n  <section id=\"work\" style=\"background: #0e0e10; color: #f6f4ee; padding: 80px 0;\">\n    <div style=\"max-width: 1240px; margin: 0 auto; padding: 0 28px;\">\n      <div style=\"font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: #ffd400; margin-bottom: 16px;\">02 — What we print<\u002Fdiv>\n      <h2 style=\"font-weight: 900; font-size: clamp(34px, 5vw, 64px); line-height: 0.98; letter-spacing: -0.04em; margin: 0 0 14px; max-width: 820px;\">If it can be printed, we print it.<\u002Fh2>\n      <p style=\"font-size: 18px; line-height: 1.5; max-width: 620px; color: #b8b8b4; margin: 0 0 44px;\">We specialize in design, layout, printing and mailing of publications with a fast turnaround that meets your deadlines.<\u002Fp>\n      <div style=\"display: flex; flex-wrap: wrap; gap: 12px;\">\n        <sc-for list=\"{{ products }}\" as=\"p\" hint-placeholder-count=\"10\">\n          <span style=\"border: 1.5px solid #444; border-radius: 100px; padding: 12px 22px; font-weight: 600; font-size: 16px;\">{{ p }}<\u002Fspan>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"margin-top: 56px; display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px;\">\n        <sc-for list=\"{{ samples }}\" as=\"img\">\n          <div style=\"position: relative; aspect-ratio: 4/3; border-radius: 2px; overflow: hidden; border: 1.5px solid #333;\">\n            {{ img.el }}\n            <div style=\"position:absolute; left:0; right:0; bottom:0; padding:14px 16px; background:linear-gradient(transparent, rgba(0,0,0,0.78)); display:flex; align-items:center; gap:10px;\">\n              <span style=\"width:8px; height:8px; border-radius:50%; background:{{ img.color }}; flex:none;\"><\u002Fspan>\n              <span style=\"font-family:'Space Mono',monospace; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; color:#fff;\">{{ img.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ PROCESS ============ -->\n  <section style=\"max-width: 1240px; margin: 0 auto; padding: 80px 28px;\">\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: #ec008c; margin-bottom: 16px;\">03 — How it works<\u002Fdiv>\n    <h2 style=\"font-weight: 900; font-size: clamp(34px, 5vw, 64px); line-height: 0.98; letter-spacing: -0.04em; margin: 0 0 48px; max-width: 700px;\">Simple from quote to delivery.<\u002Fh2>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 32px;\">\n      <sc-for list=\"{{ steps }}\" as=\"st\" hint-placeholder-count=\"4\">\n        <div>\n          <div style=\"font-weight: 900; font-size: 64px; line-height: 1; letter-spacing: -0.05em; color: {{ st.color }};\">{{ st.n }}<\u002Fdiv>\n          <div style=\"height: 2px; background: #0e0e10; margin: 18px 0;\"><\u002Fdiv>\n          <h3 style=\"font-weight: 800; font-size: 21px; letter-spacing: -0.02em; margin: 0 0 8px;\">{{ st.title }}<\u002Fh3>\n          <p style=\"font-size: 15px; line-height: 1.5; color: #555; margin: 0;\">{{ st.desc }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ ABOUT ============ -->\n  <section id=\"about\" style=\"background: #fff; border-top: 2px solid #0e0e10; border-bottom: 2px solid #0e0e10; padding: 80px 0;\">\n    <div style=\"max-width: 1240px; margin: 0 auto; padding: 0 28px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 56px; align-items: start;\">\n      <div>\n        <div style=\"font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: #00aeef; margin-bottom: 16px;\">04 — About us<\u002Fdiv>\n        <h2 style=\"font-weight: 900; font-size: clamp(32px, 4.4vw, 56px); line-height: 1; letter-spacing: -0.04em; margin: 0 0 24px;\">A family that's been printing for generations.<\u002Fh2>\n        <p style=\"font-size: 18px; line-height: 1.6; color: #2a2a2e; margin: 0 0 18px;\">We've been in business in Austin for over a decade, but printing has been in our family for more than 35 years. We take pride in taking care of our customers and delivering a great-looking finished product.<\u002Fp>\n        <p style=\"font-size: 18px; line-height: 1.6; color: #2a2a2e; margin: 0;\">From a postcard for mailing to a monthly magazine, from business cards to envelopes to just about anything you need printed — you need not look further.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 14px;\">\n        <sc-for list=\"{{ values }}\" as=\"v\" hint-placeholder-count=\"3\">\n          <div style=\"border: 2px solid #0e0e10; border-radius: 2px; padding: 22px 24px; display: flex; gap: 18px; align-items: center;\">\n            <span style=\"width: 14px; height: 36px; background: {{ v.color }}; border-radius: 2px; flex: none;\"><\u002Fspan>\n            <div>\n              <div style=\"font-weight: 800; font-size: 18px; letter-spacing: -0.01em;\">{{ v.title }}<\u002Fdiv>\n              <div style=\"font-size: 14px; color: #666; margin-top: 3px;\">{{ v.desc }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ TEAM ============ -->\n  <section id=\"team\" style=\"max-width: 1240px; margin: 0 auto; padding: 80px 28px;\">\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: #ffd400; margin-bottom: 16px;\">05 — Meet the team<\u002Fdiv>\n    <h2 style=\"font-weight: 900; font-size: clamp(34px, 5vw, 64px); line-height: 0.98; letter-spacing: -0.04em; margin: 0 0 48px;\">The Moreno family.<\u002Fh2>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px;\">\n      <sc-for list=\"{{ team }}\" as=\"m\" hint-placeholder-count=\"4\">\n        <div style=\"background: #fff; border: 2px solid #0e0e10; border-radius: 2px; padding: 28px; display: flex; flex-direction: column; min-height: 180px;\">\n          <span style=\"width: 40px; height: 8px; border-radius: 2px; background: {{ m.color }}; margin-bottom: auto;\"><\u002Fspan>\n          <div style=\"font-weight: 800; font-size: 22px; letter-spacing: -0.02em; margin-top: 28px;\">{{ m.name }}<\u002Fdiv>\n          <div style=\"font-size: 14px; color: #666; margin: 4px 0 14px;\">{{ m.role }}<\u002Fdiv>\n          <a href=\"mailto:{{ m.email }}\" style=\"font-family: 'Space Mono', monospace; font-size: 12px; color: #ec008c; text-decoration: none; word-break: break-all;\">{{ m.email }}<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ QUOTE / CONTACT ============ -->\n  <section id=\"quote\" style=\"background: #0e0e10; color: #f6f4ee; padding: 80px 0;\">\n    <div style=\"max-width: 1240px; margin: 0 auto; padding: 0 28px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 56px; align-items: start;\">\n      <div>\n        <div style=\"font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: #ffd400; margin-bottom: 16px;\">06 — Get a quote<\u002Fdiv>\n        <h2 style=\"font-weight: 900; font-size: clamp(34px, 5vw, 64px); line-height: 0.96; letter-spacing: -0.04em; margin: 0 0 24px;\">Let's get your job on press.<\u002Fh2>\n        <p style=\"font-size: 18px; line-height: 1.6; color: #b8b8b4; margin: 0 0 36px; max-width: 480px;\">Tell us what you need and we'll get back to you with pricing and turnaround. Stock and print-ready files welcome — we'll quote special pricing on additional copies and varying specs.<\u002Fp>\n        <div style=\"display: flex; flex-direction: column; gap: 22px;\">\n          <a href=\"tel:5123891747\" style=\"text-decoration: none; color: #f6f4ee; display: flex; align-items: center; gap: 16px;\">\n            <span style=\"width: 10px; height: 28px; background: #00aeef; flex:none;\"><\u002Fspan>\n            <span><span style=\"display:block; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#888;\">Call<\u002Fspan><span style=\"font-weight:800; font-size:22px;\">512-389-1747<\u002Fspan><\u002Fspan>\n          <\u002Fa>\n          <a href=\"mailto:admin@artjampro.net\" style=\"text-decoration: none; color: #f6f4ee; display: flex; align-items: center; gap: 16px;\">\n            <span style=\"width: 10px; height: 28px; background: #ec008c; flex:none;\"><\u002Fspan>\n            <span><span style=\"display:block; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#888;\">Email<\u002Fspan><span style=\"font-weight:800; font-size:22px;\">admin@artjampro.net<\u002Fspan><\u002Fspan>\n          <\u002Fa>\n          <div style=\"display: flex; align-items: center; gap: 16px;\">\n            <span style=\"width: 10px; height: 28px; background: #ffd400; flex:none;\"><\u002Fspan>\n            <span><span style=\"display:block; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#888;\">Visit<\u002Fspan><span style=\"font-weight:800; font-size:22px;\">3414 East 5th Street, Austin, TX 78702<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"backgro ion>Mailing Services<\u002Foption>\n                <option>Not sure yet<\u002Foption>\n              <\u002Fselect>\n              <textarea value=\"{{ form.details }}\" onchange=\"{{ onDetails }}\" placeholder=\"What do you need printed? Quantity, size, deadline…\" rows=\"4\" style=\"font-family:inherit; font-size:15px; padding:13px 14px; border:2px solid #0e0e10; border-radius:2px; background:#fff; width:100%; resize:vertical;\"><\u002Ftextarea>\n              <button type=\"submit\" style=\"background:#ec008c; color:#fff; border:none; border-radius:2px; padding:15px; font-weight:800; font-size:16px; font-family:inherit; cursor:pointer;\">Request quote →<\u002Fbutton>\n              <div style=\"font-size:12px; color:#888; text-align:center;\">Or call us anytime — we look forward to hearing from you.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fform>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FOOTER ============ -->\n  <footer style=\"background: #f6f4ee; padding: 56px 28px 40px;\">\n    <div style=\"max-width: 1240px; margin: 0 auto;\">\n      <div style=\"height: 14px; display: flex; border-radius: 2px; overflow: hidden; margin-bottom: 40px;\">\n        <span style=\"flex:1; background:#00aeef;\"><\u002Fspan><span style=\"flex:1; background:#ec008c;\"><\u002Fspan><span style=\"flex:1; background:#ffd400;\"><\u002Fspan><span style=\"flex:1; background:#0e0e10;\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-wrap: wrap; justify-content: space-between; gap: 28px; align-items: flex-start;\">\n        <div>\n          <div style=\"font-weight: 900; font-size: 26px; letter-spacing: -0.03em;\">ArtJam Productions, Inc.<\u002Fdiv>\n          <div style=\"font-size: 15px; color: #555; margin-top: 8px; line-height: 1.6;\">Family owned &amp; HUB certified<br>3414 East 5th Street, Austin, TX 78702<br>ph: 512-389-1747 · admin@artjampro.net<\u002Fdiv>\n        <\u002Fdiv>\n        <di
